{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'produkt/css/lieferadresse.css' %}">
{% endblock %}

{% block title %}Lieferadresse eingeben{% endblock %}

{% block content %}
<h1 class="lieferadresse-title">Lieferadresse für {{ produkt.name }}</h1>

<form method="post" class="lieferadresse-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Adresse speichern</button>
</form>

{% endblock %}
