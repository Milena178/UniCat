{% extends "base.html" %}
{% load static %}

{% block title %}Kundenservice kontaktieren{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'profil/css/anfrage.css' %}">
{% endblock %}

{% block content %}
<div class="cs-support-detail">

    <h1>Neue Support-Anfrage</h1>
    <p class="lead">Beschreibe dein Anliegen so genau wie möglich.</p>

    <form method="post" class="support-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_subject">Betreff</label>
            {{ form.subject }}
        </div>

        <div class="form-group">
            <label for="message">Nachricht</label>
            <textarea name="message" rows="6" required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                Anfrage absenden
            </button>
            <a href="{% url 'home' %}" class="btn btn-secondary">
                Abbrechen
            </a>
        </div>
    </form>

</div>
{% endblock %}
