{% extends "base.html" %}

{% block title %}Bewertung löschen{% endblock %}

{% block content %}
<h1>Bewertung löschen</h1>

<p>Möchtest du diese Bewertung wirklich löschen?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Ja, löschen</button>
</form>

<p>
    <a href="{% url 'profil:profil_detail' pk=object.profile.user.pk %}">
        Abbrechen
    </a>
</p>
{% endblock %}
