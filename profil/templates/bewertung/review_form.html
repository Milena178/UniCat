{% extends "base.html" %}

{% block title %}Bewertung schreiben{% endblock %}

{% block content %}

<h1>Bewertung schreiben für {{ profile.username }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Absenden</button>
</form>

<p>
    <a href="{% url 'profil:profil_detail' profile.pk %}">Abbrechen</a>
</p>

{% endblock %}
