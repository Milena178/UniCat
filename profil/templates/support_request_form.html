{% extends "base.html" %}

{% block title %}Kundenservice kontaktieren{% endblock %}

{% block content %}
<h2>Neue Support-Anfrage</h2>

<form method="post">
    {% csrf_token %}

    <p>
        <label>Betreff</label><br>
        {{ form.subject }}
    </p>

    <p>
        <label>Nachricht</label><br>
        <textarea name="message" rows="6" style="width:100%;" required></textarea>
    </p>

    <button type="submit">Anfrage absenden</button>
</form>

<p>
    <a href="{% url 'home' %}">Abbrechen</a>
</p>
{% endblock %}
