{% extends 'home.html' %}

{% load static %}
{% block css %}
    <link rel="stylesheet" href="{% static 'css/SignUp.css' %}">
{% endblock %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h2 class="signUp-title">Sign up</h2>
<form method="post" class="signup-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-signup">Sign up</button>
</form>
{% endblock %}
